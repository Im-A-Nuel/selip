[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

[rpc_endpoints]
arbitrum = "${ARBITRUM_RPC_URL}"
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"

[etherscan]
# No explicit url: forge >=1.x defaults to the Etherscan V2 unified endpoint and
# appends chainid from the chain field. Setting a url here disables that
# auto-injection (the legacy arbiscan V1 endpoints are deprecated).
arbitrum = { key = "${ARBISCAN_API_KEY}", chain = 42161 }
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}", chain = 421614 }
